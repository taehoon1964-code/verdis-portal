<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VERDIS Platform</title>
  <meta http-equiv="refresh" content="0;url=https://script.google.com/macros/s/AKfycbxS-R1Q-eWeOh8XtIacCz6O8ZbshozyKdTOWtt9u267rwOsDc9RcGx-_UfX6fHP6UE0Cg/exec">
  <style>
    body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;
         background:linear-gradient(135deg,#0f172a,#1e3a5f);font-family:'Segoe UI',sans-serif;color:#fff}
    .card{text-align:center;padding:48px;border-radius:20px;background:rgba(255,255,255,.06);
          backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,.3)}
    .spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,.15);
             border-top-color:#22d3ee;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h2>🌿 VERDIS Platform</h2>
    <p>플랫폼에 접속 중입니다...</p>
  </div>
  <script>
    window.location.replace("https://script.google.com/macros/s/AKfycbxS-R1Q-eWeOh8XtIacCz6O8ZbshozyKdTOWtt9u267rwOsDc9RcGx-_UfX6fHP6UE0Cg/exec");
  </script>
</body>
</html>
