<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VERDIS-ESRS</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Noto Sans KR',-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#052e16,#064e3b,#065f46);color:#fff}
    .card{text-align:center;padding:48px 40px;background:rgba(255,255,255,.06);border-radius:20px;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);max-width:420px;width:90%}
    .logo{font-size:48px;margin-bottom:16px}
    h1{font-size:22px;font-weight:700;margin-bottom:6px}
    .sub{font-size:13px;opacity:.7;margin-bottom:32px}
    .spinner{width:36px;height:36px;margin:0 auto 20px;border:3px solid rgba(255,255,255,.15);border-top:3px solid #10b981;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .msg{font-size:14px;opacity:.9}
    .footer{margin-top:32px;font-size:10px;opacity:.4}

    /* iframe 전체화면 */
    #app-frame{
      display:none;
      position:fixed;
      top:0;left:0;
      width:100%;height:100%;
      border:none;
      z-index:9999;
    }
  </style>
</head>
<body>
  <!-- 로딩 카드 -->
  <div class="card" id="loading-card">
    <div class="icon">📑</div>
    <div class="name">VERDIS-ESRS</div>
    <div class="desc">유럽 지속가능성 보고<br>CSRD / ESRS 대응</div>
    <div class="spinner"></div>
    <div class="msg">플랫폼에 접속하고 있습니다...</div>
    <div class="footer">Powered by INTERWELL & Plan A Plus</div>
  </div>

  <!-- iframe -->
  <iframe
    id="app-frame"
    src="https://script.google.com/macros/s/AKfycby5-ZvQxpSSw_6FmkPcZ-rjcO-Y7jm11E5yeTf1-iHnRv-2kwuB3FPq36WSY4n9G6Vadw/exec?app=esrs"
    allowfullscreen
    allow="clipboard-read; clipboard-write">
  </iframe>

  <script>
    var frame = document.getElementById('app-frame');
    frame.addEventListener('load', function(){
      document.getElementById('loading-card').style.display = 'none';
      frame.style.display = 'block';
    });
  </script>
</body>
</html>
